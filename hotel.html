<!DOCTYPE html>
<html>
<head>
<title>Royal Stay Hotel</title>

<style>
body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1566073771259-6a8506099945") center/cover no-repeat;
color:white;
}

.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:20px;
}

.rooms{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.room{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
width:250px;
}

img{
width:100%;
border-radius:10px;
}

button{
padding:10px;
background:#ff9800;
border:none;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<div class="overlay">

<h1>Royal Stay Hotel</h1>
<p>Luxury Comfort in the Heart of City</p>

<h2>Rooms</h2>

<div class="rooms">

<div class="room">
<img src="https://source.unsplash.com/300x200/?hotel-room">
<h3>Deluxe Room</h3>
<p>₹3500 / Night</p>
<button>Book Room</button>
</div>

<div class="room">
<img src="https://source.unsplash.com/300x200/?luxury-hotel">
<h3>Luxury Suite</h3>
<p>₹6500 / Night</p>
<button>Book Room</button>
</div>

</div>

<h2>Hotel Info</h2>
<p>Location: MG Road, Pune</p>
<p>Contact: +91 9876543210</p>

</div>

</body>
</html>
