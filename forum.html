<!DOCTYPE html>
<html>
<head>

<style>

}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
}

.post{

border-radius:10px;

}

textarea{
width:100%;

}

button{

background:#4caf50;

color:white;

}
</style>

</head>

<div class="overlay">

<h1>City Community Forum</h1>

<h2>Create Post</h2>

<textarea placeholder="Share your thoughts..."></textarea>

<div class="post">
<h3>Best food places in Pune?</h3>
<p>Any recommendations for street food?</p>
</div>

</div>

</div>

</html>
