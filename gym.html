   <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Influencer</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body, html {
    height: 100%;
    font-family: Arial, sans-serif;
    scroll-behavior: smooth; /* Smooth scrolling */
  }

  /* Hero Section */
  .hero {
    height: 100vh;
    width: 100%;
    overflow: hidden;
    position: relative;
    cursor: grab;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('https://images.unsplash.com/photo-1599058917216-8f3c1f35b3b3'); /* Replace your image */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: transform 0.2s ease-out; /* For parallax effect */
    z-index: -2;
  }

  /* Dark overlay */
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: -1;
  }

  /* Hero content */
  .hero-content {
    position: relative;
    color: #fff;
    text-align: center;
    padding: 0 20px;
    max-width: 800px;
    margin: 0 auto;
    top: 50%;
    transform: translateY(-50%);
    animation: floatText 3s ease-in-out infinite alternate; /* Floating text animation */
  }

  .hero-content h1 {
    font-size: 3rem;
    margin-bottom: 20px;
  }

  .hero-content p {
    font-size: 1.2rem;
    margin-bottom: 30px;
  }

  .hero-content a {
    display: inline-block;
    padding: 15px 30px;
    font-size: 1rem;
    color: #fff;
    background: #00ff7f;
    text-decoration: none;
    border-radius: 8px;
    transition: transform 0.3s ease, background 0.3s ease;
  }

  .hero-content a:hover {
    background: #00cc66;
    transform: scale(1.1); /* Hover animation */
  }

  /* Floating animation */
  @keyframes floatText {
    0% { transform: translateY(-50%) translateY(0px); }
    100% { transform: translateY(-50%) translateY(-15px); }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .hero-content h1 { font-size: 2rem; }
    .hero-content p { font-size: 1rem; }
    .hero-content a { padding: 12px 25px; font-size: 0.9rem; }
  }

  @media (max-width: 480px) {
    .hero-content h1 { font-size: 1.5rem; }
    .hero-content p { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-content">
    <h1>Transform Your Body in 90 Days</h1>
    <p>Join our fitness journey and achieve your ultimate goal. Personalized workouts & nutrition plans.</p>
    <a href="#signup">Start Your Journey</a>
  </div>
</section>

<script>
  // Parallax effect on mouse move
  const hero = document.querySelector('.hero');
  const bg = document.querySelector('.hero::before');

  hero.addEventListener('mousemove', (e) => {
    const { innerWidth, innerHeight } = window;
    const x = (e.clientX / innerWidth) * 20 - 10; // range: -10 to 10
    const y = (e.clientY / innerHeight) * 20 - 10;
    hero.style.setProperty('--mx', x + 'px');
    hero.style.setProperty('--my', y + 'px');
    hero.querySelector('::before').style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
  });
</script>

</body>
</html>
