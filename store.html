<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urban Store</title>

<style>

body{
margin:0;
font-family:Arial;
}

.hero{
height:80vh;
background:url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1500&q=80") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.products{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

.card{
background:#f5f5f5;
padding:10px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="hero">

<div>

<h1>Urban Store</h1>

<p>Trending Fashion Products</p>

</div>

</div>

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1520975922215-230e5f0d05c3">

<h3>Shoes</h3>

<button>Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">

<h3>Jacket</h3>

<button>Buy</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">

<h3>T-shirt</h3>

<button>Buy</button>

</div>

</div>

</body>
</html>
