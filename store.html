<!DOCTYPE html>
<html>
<head>
<title>FreshMart Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1604719312566-8912e9c8a213") center/cover no-repeat;
color:white;
}

.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:20px;
}

.products{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.product{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
width:200px;
}

img{
width:100%;
border-radius:10px;
}

button{
padding:10px;
background:#00bcd4;
border:none;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<div class="overlay">

<h1>FreshMart Grocery</h1>
<p>Your neighborhood supermarket</p>

<h2>Products</h2>

<div class="products">

<div class="product">
<img src="https://source.unsplash.com/200x150/?vegetables">
<h3>Fresh Vegetables</h3>
<p>₹120/kg</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://source.unsplash.com/200x150/?fruits">
<h3>Fresh Fruits</h3>
<p>₹150/kg</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://source.unsplash.com/200x150/?grocery">
<h3>Daily Grocery</h3>
<p>Best price</p>
<button>Add to Cart</button>
</div>

</div>

<h2>Store Info</h2>
<p>Location: Pune Market Road</p>
<p>Open: 8 AM – 10 PM</p>
<p>Phone: +91 9876543210</p>

</div>

</body>
</html>
