 <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CityCare Clinic</title>

<style>

body{
margin:0;
font-family:Arial;
color:#333;
}

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1584982751601-97dcc096659c?auto=format&fit=crop&w=1500&q=80") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1{
font-size:40px;
animation:fade 2s;
}

.btn{
background:#1da1f2;
padding:12px 25px;
border-radius:25px;
color:white;
text-decoration:none;
display:inline-block;
margin-top:20px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

.section{
padding:60px 20px;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<div class="hero">

<div>

<h1>CityCare Clinic</h1>

<p>Trusted Healthcare For Your Family</p>

<a class="btn" href="#">Book Appointment</a>

</div>

</div>

<div class="section">

<h2>Our Clinic</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3">

<img src="https://images.unsplash.com/photo-1581594693702-fbdc51b2763b">

<img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118">

</div>

</div>

<div class="section">

<h2>Contact</h2>

<p>Location: Pune</p>

<p>Timing: 9AM – 8PM</p>

<p>Phone: +91 99999 99999</p>

</div>

</body>
</html>
